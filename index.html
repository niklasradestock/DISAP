function getStores() {
  return Object.values(mapData);
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, char => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[char]));
}

function initialsFromName(value) {
  const cleaned = String(value || "").trim();
  return cleaned ? cleaned.slice(0, 2).toUpperCase() : "DU";
}

function getStoredSet(key) {
  try {
    return new Set(JSON.parse(localStorage.getItem(key) || "[]"));
  } catch (error) {
    return new Set();
  }
}

function saveStoredSet(key, set) {
  localStorage.setItem(key, JSON.stringify([...set]));
}

function isFavoriteStore(name) {
  return getStoredSet("disapFavoriteStores").has(name);
}

function toggleFavoriteStore(name) {
  const favorites = getStoredSet("disapFavoriteStores");
  favorites.has(name) ? favorites.delete(name) : favorites.add(name);
  saveStoredSet("disapFavoriteStores", favorites);
  return favorites.has(name);
}

function isBookmarkedPost(id) {
  return getStoredSet("disapBookmarkedPosts").has(id);
}

function toggleBookmarkedPost(id) {
  const bookmarks = getStoredSet("disapBookmarkedPosts");
  bookmarks.has(id) ? bookmarks.delete(id) : bookmarks.add(id);
  saveStoredSet("disapBookmarkedPosts", bookmarks);
  return bookmarks.has(id);
}

function parseTimeToMinutes(value) {
  const [hours, minutes] = String(value).split(":").map(Number);
  return (hours * 60) + (minutes || 0);
}

function getStoreStatus(store) {
  const now = new Date();
  let current = now.getHours() * 60 + now.getMinutes();
  let open = parseTimeToMinutes(store.open);
  let close = parseTimeToMinutes(store.close);
  if (close <= open) {
    close += 1440;
    if (current < open) current += 1440;
  }
  const isOpen = current >= open && current < close;
  if (!isOpen) return { text: "Geschlossen", className: "closed" };
  const minutesToClose = close - current;
  if (minutesToClose <= 60) return { text: "Schließt demnächst", className: "soon" };
  return { text: "Geöffnet", className: "open" };
}

function favoriteButtonMarkup(name, compact=false) {
  const active = isFavoriteStore(name);
  return `<button class="favorite-btn ${active ? "active" : ""}" data-toggle-favorite="${escapeHtml(name)}" aria-label="${active ? "Aus Favoriten entfernen" : "Zu Favoriten hinzufügen"}" title="Favorit">${active ? "♥" : "♡"}</button>`;
}

function bookmarkIconMarkup(className = "bookmark-inline-icon") {
  return `<img src="${BOOKMARK_ICON}" class="${className}" alt="">`;
}

function bookmarkButtonMarkup(id) {
  const active = isBookmarkedPost(id);
  return `<button class="bookmark-btn ${active ? "active" : ""}" data-toggle-bookmark="${escapeHtml(id)}" aria-label="${active ? "Lesezeichen entfernen" : "Als Lesezeichen markieren"}" title="Lesezeichen">${bookmarkIconMarkup("bookmark-icon")}</button>`;
}

function renderFavoriteDashboardList() {
  const favorites = getStoredSet("disapFavoriteStores");
  const stores = getStores().filter(store => favorites.has(store.name));
  if (!stores.length) return `<div class="saved-empty">Noch keine Lieblingsläden markiert. Nutze das Herz Symbol auf dem Dashboard oder im Radar.</div>`;
  return stores.map(store => `<div class="saved-item"><div><strong>${store.icon} ${escapeHtml(store.name)}</strong><p>${escapeHtml(store.category)} · ${escapeHtml(store.distance)}</p></div>${favoriteButtonMarkup(store.name, true)}</div>`).join("");
}

function renderBookmarkDashboardList() {
  const bookmarks = getStoredSet("disapBookmarkedPosts");
  const posts = announcementData.filter(post => bookmarks.has(post.id));
  if (!posts.length) return `<div class="saved-empty">Noch keine Ankündigungen als Lesezeichen gespeichert. Nutze das Lesezeichen Symbol im Ankündigung Tab.</div>`;
  return posts.map(post => `<div class="saved-item"><div><strong class="bookmark-title-label">${bookmarkIconMarkup("bookmark-inline-icon")}<span>${escapeHtml(post.title)}</span></strong><p>${escapeHtml(post.tag)} · Stadt Leipzig</p></div></div>`).join("");
}

function updateFavoriteButtons(name) {
  const active = isFavoriteStore(name);
  document.querySelectorAll(`[data-toggle-favorite="${CSS.escape(name)}"]`).forEach(btn => {
    btn.classList.toggle("active", active);
    btn.textContent = active ? "♥" : "♡";
    btn.setAttribute("aria-label", active ? "Aus Favoriten entfernen" : "Zu Favoriten hinzufügen");
  });
  document.querySelectorAll(`.pin[data-title="${CSS.escape(name)}"]`).forEach(pin => pin.classList.toggle("favorite", active));
  const favoriteList = document.getElementById("dashboardFavorites");
  if (favoriteList) favoriteList.innerHTML = renderFavoriteDashboardList();
}

function updateBookmarkButtons(id) {
  const active = isBookmarkedPost(id);
  document.querySelectorAll(`[data-toggle-bookmark="${CSS.escape(id)}"]`).forEach(btn => {
    btn.classList.toggle("active", active);
    btn.setAttribute("aria-label", active ? "Lesezeichen entfernen" : "Als Lesezeichen markieren");
  });
  const bookmarkList = document.getElementById("dashboardBookmarks");
  if (bookmarkList) bookmarkList.innerHTML = renderBookmarkDashboardList();
}

function bindFavoriteButtons(extraUpdate) {
  document.querySelectorAll("[data-toggle-favorite]").forEach(btn => btn.addEventListener("click", event => {
    event.stopPropagation();
    const name = btn.dataset.toggleFavorite;
    toggleFavoriteStore(name);
    updateFavoriteButtons(name);
    if (typeof extraUpdate === "function") extraUpdate();
  }));
}

function bindBookmarkButtons(extraUpdate) {
  document.querySelectorAll("[data-toggle-bookmark]").forEach(btn => btn.addEventListener("click", event => {
    event.stopPropagation();
    const id = btn.dataset.toggleBookmark;
    toggleBookmarkedPost(id);
    updateBookmarkButtons(id);
    if (typeof extraUpdate === "function") extraUpdate();
  }));
}

class DemoApp {
  constructor(root) {
    this.root = root;
    this.isLoggedIn = sessionStorage.getItem("disapLoggedIn") === "true";
    this.username = sessionStorage.getItem("disapUsername") || "Admin";
    this.view = location.hash.replace("#","") || "home";
    this.nav = [
      ["home","⌂","Start"],
      ["radar","⌖","Radar"],
      ["qr","▣","QR"],
      ["announcements","📢","Ankünd."],
      ["profile","◌","Profil"]
    ];
  }

  init() {
    window.addEventListener("hashchange", () => {
      if (!this.isLoggedIn) {
        this.render();
        return;
      }
      this.view = location.hash.replace("#","") || "home";
      this.render();
    });
    this.render();
  }

  render() {
    if (!this.isLoggedIn) {
      this.root.innerHTML = new LoginView().render();
      this.bind();
      return;
    }

    this.root.innerHTML = `
      <main class="shell">
        ${this.header()}
        <section>${this.page()}</section>
        ${this.navigation()}
      </main>
    `;
    this.bind();
  }

  header() {
    const username = escapeHtml(this.username);
    const copy = {
      home:[`Hallo, ${username} 👋`,"Entdecke teilnehmende Shops in deiner Nähe und behalte deine Punkte im Blick."],
      radar:["Aktionsradar","Finde kulturelle Angebote in deiner Nähe, sammle Punkte und entdecke aktuelle Events teilnehmender DISAP Partner."],
      announcements:["Ankündigungen","Offizielle Informationen, Umfragen und Events der Stadt Leipzig direkt in der DISAP App."],
      qr:[`Hier ist dein persönlicher QR-Code, ${username}!`, ""],
      profile:["Profil","Verwalte dein Benutzerkonto, deine Einstellungen und deine bevorzugten DISAP Funktionen."]
    };
    const [title,text] = copy[this.view] || copy.home;
    return `
      <header class="header">
        <div class="brand">
          <div>
            <div class="logo">DISAP</div>
            <div class="sub">Der digitale Sammelpass</div>
          </div>
        </div>
        <div class="headtext"><h1>${title}</h1>${text ? `<p>${text}</p>` : ""}</div>
      </header>
    `;
  }

  navigation() {
    const initials = escapeHtml(initialsFromName(this.username));
    return `<nav class="nav">${this.nav.map(([id,icon,label]) => {
      const renderedIcon = id === "profile"
        ? `<span class="nav-usericon">${initials}</span>`
        : `<span class="nav-icon ${id === "radar" ? "radar-icon" : ""}">${icon}</span>`;
      return `
      <button class="${this.view===id ? "active" : ""}" data-view="${id}">
        ${renderedIcon}${label}
      </button>`;
    }).join("")}</nav>`;
  }

  page() {
    if (this.view === "radar") return new RadarView().render();
    if (this.view === "announcements") return new AnnouncementsView().render();
    if (this.view === "qr") return new QRView(this.username).render();
    if (this.view === "profile") return new ProfileView(this.username).render();
    return new HomeView().render();
  }

  bind() {
    if (!this.isLoggedIn) {
      LoginView.bind((username, password) => {
        const validUsername = Boolean(username) && !/\s/.test(username);
        if (validUsername && password === "Admin") {
          sessionStorage.setItem("disapLoggedIn", "true");
          sessionStorage.setItem("disapUsername", username);
          this.username = username;
          this.isLoggedIn = true;
          this.view = "home";
          location.hash = "home";
          this.render();
        } else {
          LoginView.showError();
        }
      });
      return;
    }

    document.querySelectorAll(".nav button").forEach(btn => btn.addEventListener("click", () => location.hash = btn.dataset.view));
    if (this.view === "home") HomeView.bind();
    if (this.view === "radar") RadarView.bind();
    if (this.view === "announcements") AnnouncementsView.bind();
    if (this.view === "profile") ProfileView.bind();
  }
}

class LoginView {
  render() {
    return `<main class="login-shell">
      <section class="login-card">
        <div class="login-brand">
          <div>
            <div class="logo">DISAP</div>
            <div class="sub">Der digitale Sammelpass</div>
          </div>
          <div class="login-mark">D</div>
        </div>
        <h1>Anmelden</h1>
        <p>Bitte melde dich an, um das DISAP Dashboard zu öffnen.</p>
        <form class="login-form" id="loginForm" novalidate>
          <div class="login-field">
            <label for="username">Nutzername</label>
            <input id="username" name="username" type="text" autocomplete="username" placeholder="Nutzername eingeben">
          </div>
          <div class="login-field">
            <label for="password">Passwort</label>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Passwort eingeben">
          </div>

  }

  static bind(onSubmit) {
    const form = document.getElementById("loginForm");

class RadarView {
  renderStore(store) {
    const status = getStoreStatus(store);
    return `<article class="radar-list-item" data-title="${store.name}" data-category="${store.category.toLowerCase()}" data-search="${store.search}">

      <div class="hours-line"><span>Öffnungszeiten: ${escapeHtml(store.hoursText)}</span><span class="status ${status.className}">${status.text}</span></div>

          <button class="chip active" data-filter="all">Alle</button>
          <button class="chip" data-filter="favorites">♥ Favoriten</button>
          <button class="chip" data-filter="gastronomie">Gastro</button>
          <button class="chip" data-filter="kultur">Kultur</button>
          <button class="chip" data-filter="einzelhandel">Einzelhandel</button>
        </div>
        <div class="map leipzig-map">
          <iframe class="osm-frame" title="Kartenausschnitt Leipzig Zentrum und Südvorstadt" src="https://www.openstreetmap.org/export/embed.html?bbox=12.3490%2C51.3240%2C12.3950%2C51.3520&layer=mapnik"></iframe>
          <div class="map-title"><h3>Leipzig Zentrum & Südvorstadt</h3><p>Beispielhafter Kartenausschnitt mit DISAP Partnern</p></div>
          <div class="map-area-label ml-hbf">Hauptbahnhof</div>
          <div class="map-area-label ml-zentrum">Zentrum</div>
          <div class="map-area-label ml-plagwitz">Leipziger Westen</div>
          <div class="map-area-label ml-sued">Südvorstadt</div>
          ${pins}
          <div class="user-position ${locationShared ? "" : "hidden"}" id="userPosition"></div>
          <div class="tip hidden" id="tip"></div>
          ${locationShared ? "" : `<div class="location-consent" id="locationConsent"><div class="location-card"><div class="location-icon">⌖</div><h3>Standort teilen?</h3><p>DISAP nutzt deinen Standort, um teilnehmende Läden und Angebote in deiner Nähe auf der Karte zu markieren.</p><button class="primary" data-share-location>Standortinformationen teilen</button></div></div>`}
          <div class="map-attribution">Kartenausschnitt: © OpenStreetMap Mitwirkende</div>
        </div>
      </div>
      <aside class="panel">
        <div class="ph"><h2>Teilnehmende Läden</h2><p>Beispielhafte DISAP Partner im Leipziger Kartenbereich.</p></div>
        <div class="events" id="radarList">
          ${stores.map(store => this.renderStore(store)).join("")}
        </div>
      </aside>
    </section>`;
  }

  static showStore(title) {
    const x = mapData[title];
    if (!x) return;
    const status = getStoreStatus(x);
    document.querySelectorAll(".pin").forEach(pin => pin.classList.toggle("selected", pin.dataset.title === title));
    const tip = document.getElementById("tip");
    if (tip) {
      tip.classList.remove("hidden");
      tip.innerHTML = `<div class="store-detail"><div class="store-top"><div><h3>${x.name}</h3><p>${x.desc}</p></div>${favoriteButtonMarkup(x.name, true)}</div><div class="meta"><span class="pill a">${x.benefit}</span><span class="pill">${x.distance}</span><span class="pill">${x.category}</span></div><div class="hours-line"><span>${x.hoursText}</span><span class="status ${status.className}">${status.text}</span></div><div class="map-actions"><button class="primary">Details</button><button class="secondary">Route</button></div></div>`;
      bindFavoriteButtons(() => RadarView.applyFilter());
    }
  }

  static applyFilter() {
    const focusPartner = sessionStorage.getItem("disapRadarPartnerFocus");
    if (focusPartner) {
      document.querySelectorAll(".pin, .radar-list-item").forEach(el => {
        const show = el.dataset.title === focusPartner;
        el.style.display = show ? (el.classList.contains("pin") ? "flex" : "grid") : "none";
      });
      const input = document.getElementById("radarSearch");
      if (input) input.value = focusPartner;
      document.querySelectorAll(".pin").forEach(pin => pin.classList.toggle("selected", pin.dataset.title === focusPartner));
      document.getElementById("tip")?.classList.add("hidden");
      return;
    }

    const active = document.querySelector(".radar-toolbar .chip.active")?.dataset.filter || "all";
    const s = (document.getElementById("radarSearch")?.value || "").toLowerCase().trim();
    document.querySelectorAll(".pin, .radar-list-item").forEach(el => {
      const favoriteOk = active !== "favorites" || isFavoriteStore(el.dataset.title);
      const typeOk = active === "all" || active === "favorites" || el.dataset.category === active;
      const textOk = (el.dataset.search + " " + el.dataset.title).toLowerCase().includes(s);
      el.style.display = favoriteOk && typeOk && textOk ? (el.classList.contains("pin") ? "flex" : "grid") : "none";
    });
  }

  static bind() {
    const chips = document.querySelectorAll(".radar-toolbar .chip");
    const input = document.getElementById("radarSearch");
    chips.forEach(chip => chip.addEventListener("click", () => {
      sessionStorage.removeItem("disapRadarPartnerFocus");
      chips.forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
      RadarView.applyFilter();
    }));
    input?.addEventListener("input", () => {
      sessionStorage.removeItem("disapRadarPartnerFocus");
      RadarView.applyFilter();
    });
    document.querySelector("[data-share-location]")?.addEventListener("click", () => {
      sessionStorage.setItem("disapLocationShared", "true");
      document.getElementById("locationConsent")?.classList.add("hidden");
      document.getElementById("userPosition")?.classList.remove("hidden");
    });
    document.querySelectorAll(".pin").forEach(pin => pin.addEventListener("click", () => RadarView.showStore(pin.dataset.title)));
    document.querySelectorAll("[data-show-store]").forEach(btn => btn.addEventListener("click", () => RadarView.showStore(btn.dataset.showStore)));
    bindFavoriteButtons(() => RadarView.applyFilter());
    RadarView.applyFilter();
  }
}

function openCatalogOnProfile() {
  sessionStorage.setItem("disapOpenCatalogOnProfile", "true");
  location.hash = "profile";
}

function applyCatalogFilter() {
  const active = document.querySelector("[data-catalog-filter].active")?.dataset.catalogFilter || "all";
  const search = (document.getElementById("catalogSearch")?.value || "").toLowerCase().trim();
  let visible = 0;
  document.querySelectorAll("#catalogModal [data-catalog-row]").forEach(row => {
    const categoryOk = active === "all" || row.dataset.category === active;
    const searchOk = (row.dataset.search || row.innerText).toLowerCase().includes(search);
    const show = categoryOk && searchOk;
    row.style.display = show ? "grid" : "none";
    if (show) visible += 1;
  });
  document.getElementById("catalogEmpty")?.classList.toggle("visible", visible === 0);
}

function bindCatalogModal() {
  const modal = document.getElementById("catalogModal");
  const open = () => {
    modal?.classList.remove("hidden");
    applyCatalogFilter();
  };
  document.querySelectorAll("[data-open-catalog]").forEach(btn => btn.addEventListener("click", event => {
    event.preventDefault();
    if (modal) open();
    else openCatalogOnProfile();
  }));
  document.querySelectorAll("[data-close-catalog]").forEach(btn => btn.addEventListener("click", () => modal?.classList.add("hidden")));
  document.querySelectorAll("[data-show-deal-partner]").forEach(btn => btn.addEventListener("click", event => {
    event.preventDefault();
    showPartnerOnRadar(btn.dataset.showDealPartner);
  }));
  modal?.addEventListener("click", event => {
    if (event.target === modal) modal.classList.add("hidden");
  });
  document.querySelectorAll("[data-catalog-filter]").forEach(btn => btn.addEventListener("click", () => {
    document.querySelectorAll("[data-catalog-filter]").forEach(x => x.classList.remove("active"));
    btn.classList.add("active");
    applyCatalogFilter();
  }));
  document.getElementById("catalogSearch")?.addEventListener("input", applyCatalogFilter);
  if (sessionStorage.getItem("disapOpenCatalogOnProfile") === "true") {
    sessionStorage.removeItem("disapOpenCatalogOnProfile");
    open();
  }
}

    return `<section class="grid2">

        <div class="sidebody">

            </div>
            <button class="history-link" data-open-history>Historie</button>
          </div>
          <div class="compact points-compact">
            <div>
              <h3>Rabatte und Coupons</h3>

            </div>

          </div>

      </div>

        <div class="ph"><h2>Einstellungen</h2><p>Beispielhafte App Einstellungen.</p></div>
        <div class="sidebody"><div class="compact"><h3>Push Benachrichtigungen</h3><p>Aktiviert für Coupons, Events und Stadtankündigungen.</p></div><div class="compact"><h3>Standortdienste</h3><p>Aktiviert für Aktionsradar und lokale Angebote.</p></div><div class="compact"><h3>Datenschutz</h3><p>Einwilligungen und Datenfreigaben verwalten.</p></div></div>
      </div>
      ${historyModalMarkup()}${catalogModalMarkup()}
    </section>`
  }

  static bind() {
    const modal = document.getElementById("historyModal");
    const open = () => modal?.classList.remove("hidden");
    const close = () => modal?.classList.add("hidden");
    const applyHistoryFilter = filter => {
      const rows = document.querySelectorAll("[data-history-row]");
      const empty = document.getElementById("historyEmpty");
      const today = new Date("2026-06-16T12:00:00");
      let visibleCount = 0;

      rows.forEach(row => {
        const rowDate = new Date(`${row.dataset.date}T12:00:00`);
        const diffDays = Math.floor((today - rowDate) / 86400000);
        let show = true;

        if (filter === "week") show = diffDays >= 0 && diffDays <= 7;
        if (filter === "month") show = diffDays >= 0 && diffDays <= 30;
        if (filter === "collect") show = row.dataset.type === "collect";
        if (filter === "redeem") show = row.dataset.type === "redeem";

        row.classList.toggle("hidden", !show);
        if (show) visibleCount += 1;
      });

      empty?.classList.toggle("visible", visibleCount === 0);
    };

    document.querySelectorAll("[data-open-history]").forEach(btn => btn.addEventListener("click", open));
    document.querySelectorAll("[data-close-history]").forEach(btn => btn.addEventListener("click", close));
    document.querySelectorAll("[data-history-filter]").forEach(btn => btn.addEventListener("click", () => {
      document.querySelectorAll("[data-history-filter]").forEach(item => item.classList.remove("active"));
      btn.classList.add("active");
      applyHistoryFilter(btn.dataset.historyFilter || "all");
    }));
    modal?.addEventListener("click", event => {
      if (event.target === modal) close();
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        close();
        document.getElementById("catalogModal")?.classList.add("hidden");
      }
    }, { once: true });
    bindCatalogModal();
  }
}
