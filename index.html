<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DISAP Demo</title>
  <style>

:root{--bg:#f7f7f5;--card:#fff;--text:#1d1d1f;--muted:#6f6f73;--line:#e3e3e0;--accent:#ff5a5f;--accent-dark:#e8464b;--soft:#f1f1ee;--city:#2f3a45;--map:#e9ece8}
*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,Arial,sans-serif}body{background:var(--bg);color:var(--text)}button{cursor:pointer;font:inherit}.shell{max-width:1180px;margin:auto;min-height:100vh;padding:24px 24px 96px}.header{background:var(--card);border:1px solid var(--line);border-radius:30px;padding:24px;margin-bottom:18px;display:flex;justify-content:space-between;gap:24px;align-items:center}.brand{display:flex;align-items:center;justify-content:space-between;gap:16px}.logo{font-size:36px;font-weight:900;letter-spacing:2px}.sub{color:var(--accent);letter-spacing:4px;font-size:12px;text-transform:uppercase}.headtext h1{font-size:28px;margin-bottom:6px}.headtext p,.muted{color:var(--muted);font-size:14px;line-height:1.45}.profile{width:48px;height:48px;border-radius:50%;background:var(--soft);display:grid;place-items:center;font-weight:800;border:1px solid var(--line)}.panel,.card{background:var(--card);border:1px solid var(--line);border-radius:30px;overflow:hidden}.ph{padding:20px;border-bottom:1px solid var(--line)}.ph h2{font-size:20px;margin-bottom:6px}.ph p{color:var(--muted);font-size:13px;line-height:1.4}.section{padding:18px}.grid2{display:grid;grid-template-columns:1fr 1.2fr;gap:18px}.gridmap{display:grid;grid-template-columns:1fr 360px;gap:18px}.grid3{display:grid;grid-template-columns:290px 1fr 330px;gap:18px}.row{display:flex;align-items:end;justify-content:space-between;margin-bottom:12px}.row h2{font-size:20px}.row a{color:var(--accent);font-size:13px;font-weight:800;text-decoration:none}.search,.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.search{margin-bottom:14px}.search input,.toolbar input{flex:1;min-width:220px;border:1px solid var(--line);background:#fbfbfa;border-radius:16px;padding:13px 14px;font-size:14px;outline:0}.primary,.search button{border:0;background:var(--accent);color:white;border-radius:14px;padding:10px 14px;font-weight:800}.secondary,.chip{border:1px solid var(--line);background:var(--soft);color:var(--text);border-radius:999px;padding:10px 12px;font-size:12px;font-weight:800}.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:calc(100% - 48px);max-width:1180px;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border:1px solid var(--line);border-bottom:0;border-radius:28px 28px 0 0;display:grid;grid-template-columns:repeat(5,1fr);padding:10px 8px 14px;z-index:10}.nav button{background:transparent;border:0;color:var(--muted);font-size:12px;font-weight:800;display:grid;gap:5px;place-items:center}.nav span{font-size:21px}.nav .active{color:var(--accent-dark)}
.points{background:linear-gradient(135deg,#222,#3b3b3b);color:#fff;border-radius:28px;padding:24px;box-shadow:0 14px 30px rgba(0,0,0,.12)}.ptop{display:flex;justify-content:space-between;margin-bottom:22px}.badge{background:rgba(255,255,255,.12);padding:8px 12px;border-radius:999px;font-size:12px}.num{font-size:46px;font-weight:900}.points p{color:rgba(255,255,255,.78);font-size:14px}.progress{height:10px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden;margin-top:8px}.progress span{display:block;width:68%;height:100%;background:var(--accent)}.quick{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}.quick button{border:0;border-radius:18px;background:var(--card);padding:14px 8px;font-weight:800}.shops{display:grid;gap:12px}.shop{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:14px;display:grid;grid-template-columns:58px 1fr auto;gap:12px;align-items:center}.ico{width:58px;height:58px;border-radius:18px;display:grid;place-items:center;font-size:24px;background:var(--soft)}.shop h3{font-size:16px;margin-bottom:4px}.shop p,.event p,.compact p{font-size:13px;color:var(--muted);line-height:1.35}.meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.pill{border-radius:999px;background:#f4f4f2;color:var(--muted);padding:5px 8px;font-size:11px;font-weight:800}.pill.a{color:var(--accent-dark);background:#fff0f0}.sp{text-align:right;font-weight:900;color:var(--accent-dark)}.sp small{display:block;color:var(--muted);font-size:11px}.coupon,.scan,.eventcard{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;display:flex;gap:16px;align-items:center;justify-content:space-between}.qr{width:110px;height:110px;border-radius:24px;background:linear-gradient(90deg,#111 10px,transparent 10px) 0 0/22px 22px,linear-gradient(#111 10px,transparent 10px) 0 0/22px 22px,#fff;border:10px solid #fff;box-shadow:0 8px 24px rgba(0,0,0,.08)}
.map{position:relative;height:560px;background:linear-gradient(45deg,transparent 48%,rgba(255,255,255,.8) 49%,rgba(255,255,255,.8) 52%,transparent 53%) 0 0/160px 160px,linear-gradient(-35deg,transparent 48%,rgba(255,255,255,.75) 49%,rgba(255,255,255,.75) 52%,transparent 53%) 30px 40px/190px 160px,radial-gradient(circle at 15% 20%,rgba(133,168,141,.45) 0 12%,transparent 13%),radial-gradient(circle at 82% 74%,rgba(216,201,174,.55) 0 14%,transparent 15%),var(--map);overflow:hidden}.river{position:absolute;left:-80px;top:240px;width:120%;height:92px;background:rgba(143,165,186,.45);transform:rotate(-10deg);border-radius:999px}.street{position:absolute;background:rgba(255,255,255,.9);border-radius:999px}.s1{left:8%;top:14%;width:70%;height:16px;transform:rotate(17deg)}.s2{left:10%;top:60%;width:78%;height:15px;transform:rotate(-21deg)}.s3{left:34%;top:4%;width:15px;height:84%;transform:rotate(5deg)}.s4{left:68%;top:12%;width:14px;height:74%;transform:rotate(-15deg)}.s5{left:6%;top:42%;width:88%;height:13px}.pin{position:absolute;width:44px;height:44px;border-radius:50% 50% 50% 8px;background:var(--accent);transform:rotate(-45deg);display:grid;place-items:center;box-shadow:0 12px 24px rgba(232,70,75,.28);border:3px solid #fff;z-index:3}.pin:hover{transform:rotate(-45deg) scale(1.08)}.pin span{transform:rotate(45deg);font-size:20px}.p1{left:24%;top:24%}.p2{left:52%;top:34%}.p3{left:70%;top:54%}.p4{left:34%;top:66%}.p5{left:78%;top:28%}.p6{left:14%;top:50%}.tip{position:absolute;left:52%;top:18%;width:230px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:14px;box-shadow:0 18px 40px rgba(0,0,0,.13);z-index:4}.tip h3{font-size:15px}.tip p{font-size:12px;color:var(--muted);line-height:1.35;margin:6px 0 10px}.events,.sidebody{padding:16px;display:grid;gap:12px}.event,.compact{border:1px solid var(--line);border-radius:22px;padding:14px;background:#fbfbfa;display:grid;gap:10px}.etop{display:flex;justify-content:space-between;gap:10px}.date{width:54px;height:54px;border-radius:18px;background:var(--text);color:white;display:grid;place-items:center;text-align:center;font-weight:900;line-height:1.05}.date small{display:block;font-size:10px;color:rgba(255,255,255,.78)}
.city{padding:20px;display:grid;gap:16px}.citylogo{height:90px;border-radius:24px;background:linear-gradient(135deg,#222,var(--city));color:#fff;display:flex;align-items:center;gap:14px;padding:18px}.seal{width:50px;height:50px;border-radius:16px;background:rgba(255,255,255,.14);display:grid;place-items:center;font-size:24px}.cat{border:1px solid var(--line);background:#fbfbfa;border-radius:18px;padding:13px;display:flex;align-items:center;gap:10px}.cat.active{border-color:rgba(255,90,95,.35);background:#fff5f5}.catico{width:36px;height:36px;border-radius:12px;background:var(--soft);display:grid;place-items:center}.feed{padding:18px;display:grid;gap:14px}.post{border:1px solid var(--line);border-radius:26px;background:#fbfbfa;padding:18px;display:grid;gap:14px}.posttop{display:flex;justify-content:space-between;gap:14px}.author{display:flex;gap:12px;align-items:center}.avatar{width:46px;height:46px;border-radius:16px;background:var(--city);color:#fff;display:grid;place-items:center}.tag{border-radius:999px;padding:7px 10px;font-size:11px;font-weight:900;background:var(--soft);color:var(--muted)}.tag.info{background:#eef2f5;color:#466a8f}.tag.survey{background:#edf6ef;color:#3f7d58}.tag.event{background:#fff5e4;color:#8d6e2f}.post h2{font-size:20px}.post p{color:var(--muted);font-size:14px;line-height:1.5}.survey{border-radius:20px;background:#fff;border:1px solid var(--line);padding:14px;display:grid;gap:10px}.option{display:grid;gap:6px}.otop{display:flex;justify-content:space-between;font-weight:800;font-size:13px}.bar{height:9px;border-radius:999px;background:var(--soft);overflow:hidden}.bar span{display:block;height:100%;background:var(--accent)}.hidden{display:none!important}
@media(max-width:980px){.shell{padding:0 0 88px;max-width:430px}.header{border-radius:0;border-left:0;border-right:0;border-top:0;display:block}.brand{margin-bottom:18px}.grid2,.gridmap,.grid3{grid-template-columns:1fr;padding:0 14px}.panel,.card{border-radius:24px}.hide-mobile{display:none}.map{height:470px}.tip{left:32px;top:24px}.nav{width:100%;max-width:430px;border-left:0;border-right:0}.nav button{font-size:10px}}

  </style>
</head>
<body>
  <div id="app">
    <noscript>Bitte JavaScript aktivieren, um die DISAP Demo zu öffnen.</noscript>
  </div>

  <script>

const shops = [
  ["Café Südplatz","☕","Kaffee, Frühstück und Kuchen in Leipzig",["2x Punkte heute","0,4 km"],340,"café südplatz gastronomie kaffee"],
  ["Bäckerei Krone","🥐","Regionale Backwaren und Snacks",["Coupon aktiv","0,8 km"],190,"bäckerei krone lebensmittel bäcker"],
  ["Flora Werkstatt","🌿","Blumen, Pflanzen und Geschenkideen",["Neu dabei","1,1 km"],85,"flora werkstatt einzelhandel blumen"],
  ["Bar Acht","🍸","Drinks, Events und Wochenaktionen",["9 kaufen, 1 gratis","1,6 km"],520,"bar acht nachtleben drinks"],
  ["Kino Passage","🎬","Kultur, Filmabende und lokale Events",["Prämien verfügbar","2,2 km"],145,"kino passage kultur freizeit"]
];

const mapData = {
  "Museum am Markt":["Museum am Markt","Sonderausstellung heute. Gratis Eintritt ab 1.000 DISAP Punkten.","100 Punkte","0,7 km","Museum"],
  "Kino Passage":["Kino Passage","Heute 20:15 Uhr. Sammle beim Ticketkauf 80 DISAP Punkte.","80 Punkte","1,2 km","Kultur"],
  "Galerie West":["Galerie West","Galerie Abend ab 18:00 Uhr. 2x Punkte auf Getränke.","2x Punkte","2,0 km","Galerie"],
  "Theater Loft":["Theater Loft","Open Stage mit aktivem Studierenden Coupon.","Coupon","1,8 km","Theater"],
  "Club Kulturhof":["Club Kulturhof","Live Session am Abend. Punkte sammeln am Einlass.","Punkte","2,4 km","Musik"],
  "Stadtbibliothek":["Stadtbibliothek","Lesung und Kulturprogramm mit DISAP Vorteil.","40 Punkte","0,9 km","Lesung"]
};

class DemoApp {
  constructor(root) {
    this.root = root;
    this.view = location.hash.replace("#","") || "home";
    this.nav = [
      ["home","⌂","Start"],
      ["radar","⌖","Radar"],
      ["announcements","📢","Ankünd."],
      ["qr","▣","QR"],
      ["profile","◌","Profil"]
    ];
  }

  init() {
    window.addEventListener("hashchange", () => {
      this.view = location.hash.replace("#","") || "home";
      this.render();
    });
    this.render();
  }

  render() {
    this.root.innerHTML = `
      <main class="shell">
        ${this.header()}
        <section>${this.page()}</section>
        ${this.navigation()}
      </main>
    `;
    this.bind();
  }

  header() {
    const copy = {
      home:["Hallo, Niklas 👋","Entdecke teilnehmende Shops in deiner Nähe und behalte deine Punkte im Blick."],
      radar:["Aktionsradar","Finde kulturelle Angebote in deiner Nähe, sammle Punkte und entdecke aktuelle Events teilnehmender DISAP Partner."],
      announcements:["Ankündigungen","Offizielle Informationen, Umfragen und Events der Stadt Leipzig direkt in der DISAP App."],
      qr:["Dein QR Code","Zeige deinen persönlichen DISAP Code zum Sammeln, Einlösen und später auch zum Bezahlen."],
      profile:["Profil","Verwalte dein Benutzerkonto, deine Einstellungen und deine bevorzugten DISAP Funktionen."]
    };
    const [title,text] = copy[this.view] || copy.home;
    return `
      <header class="header">
        <div class="brand">
          <div>
            <div class="logo">DISAP</div>
            <div class="sub">Der digitale Sammelpass</div>
          </div>
          <div class="profile">NR</div>
        </div>
        <div class="headtext"><h1>${title}</h1><p>${text}</p></div>
      </header>
    `;
  }

  navigation() {
    return `<nav class="nav">${this.nav.map(([id,icon,label]) => `
      <button class="${this.view===id ? "active" : ""}" data-view="${id}">
        <span>${icon}</span>${label}
      </button>`).join("")}</nav>`;
  }

  page() {
    if (this.view === "radar") return new RadarView().render();
    if (this.view === "announcements") return new AnnouncementsView().render();
    if (this.view === "qr") return new QRView().render();
    if (this.view === "profile") return new ProfileView().render();
    return new HomeView().render();
  }

  bind() {
    document.querySelectorAll(".nav button").forEach(btn => btn.addEventListener("click", () => location.hash = btn.dataset.view));
    if (this.view === "home") HomeView.bind();
    if (this.view === "radar") RadarView.bind();
    if (this.view === "announcements") AnnouncementsView.bind();
  }
}

class HomeView {
  renderShop(shop) {
    const [name,icon,desc,tags,points,search] = shop;
    return `<article class="shop" data-search="${search}">
      <div class="ico">${icon}</div>
      <div>
        <h3>${name}</h3>
        <p>${desc}</p>
        <div class="meta">${tags.map((t,i)=>`<span class="pill ${i===0?"a":""}">${t}</span>`).join("")}</div>
      </div>
      <div class="sp">${points}<small>Punkte</small></div>
    </article>`;
  }

  render() {
    return `<div class="grid2">
      <div>
        <section class="section">
          <div class="points">
            <div class="ptop"><div><div class="muted">Dein Punktekonto</div><strong>Alle DISAP Punkte</strong></div><div class="badge">Aktiv</div></div>
            <div class="num">1.280</div>
            <p>Noch 220 Punkte bis zur nächsten Prämie.</p>
            <div class="progress"><span></span></div>
          </div>
          <div class="quick"><button data-qr>QR zeigen</button><button>Coupons</button><button>Historie</button></div>
        </section>
        <section class="section">
          <div class="row"><h2>Dein QR-Code</h2></div>
          <div class="scan"><div><h3>Beim Einkauf scannen lassen</h3><p>Nutze deinen persönlichen Code zum Sammeln, Einlösen und später auch zum Bezahlen.</p></div><div class="qr"></div></div>
        </section>
        <section class="section">
          <div class="row"><h2>Aktueller Vorteil</h2></div>
          <div class="coupon"><div><h3>Gratis Kaffee</h3><p>Einlösbar ab 1.500 Punkten bei teilnehmenden Cafés.</p></div><button class="primary">Einlösen</button></div>
        </section>
      </div>
      <div>
        <section class="section">
          <div class="row"><h2>Teilnehmende Shops</h2><a href="#radar">Aktionsradar öffnen</a></div>
          <div class="search"><input id="shopSearch" placeholder="Shop, Branche oder Ort suchen"><button>Suchen</button></div>
          <div class="shops" id="shopList">${shops.map(this.renderShop).join("")}</div>
        </section>
      </div>
    </div>`;
  }

  static bind() {
    const input = document.getElementById("shopSearch");
    const filter = () => {
      const s = (input.value || "").toLowerCase().trim();
      document.querySelectorAll(".shop").forEach(el => {
        const t = (el.dataset.search + " " + el.innerText).toLowerCase();
        el.style.display = t.includes(s) ? "grid" : "none";
      });
    };
    input?.addEventListener("input", filter);
    document.querySelector("[data-qr]")?.addEventListener("click", () => location.hash = "qr");
  }
}

class RadarView {
  renderEvent(d,m,t,p) {
    return `<article class="event"><div class="etop"><div><h3>${t}</h3><p>${p}</p></div><div class="date">${d}<small>${m}</small></div></div><div><button class="primary">Anzeigen</button> <button class="secondary">Merken</button></div></article>`;
  }

  render() {
    const pins = Object.keys(mapData).map((title,i)=>`<button class="pin p${i+1}" title="${title}"><span>${["🏛","🎬","🖼","🎭","🎵","📚"][i]}</span></button>`).join("");
    return `<section class="gridmap">
      <div class="panel">
        <div class="toolbar"><input placeholder="Kulturangebot oder Ort suchen"><button class="chip active">Alle</button><button class="chip">Museum</button><button class="chip">Kino</button><button class="chip">Event</button></div>
        <div class="map">
          <div class="river"></div><div class="street s1"></div><div class="street s2"></div><div class="street s3"></div><div class="street s4"></div><div class="street s5"></div>
          ${pins}
          <div class="tip" id="tip"><h3>Kino Passage</h3><p>Heute 20:15 Uhr. Sammle beim Ticketkauf 80 DISAP Punkte.</p><div class="meta"><span class="pill a">80 Punkte</span><span class="pill">1,2 km</span><span class="pill">Kultur</span></div></div>
        </div>
      </div>
      <aside class="panel">
        <div class="ph"><h2>Events im Raum</h2><p>Aktuelle Veranstaltungen teilnehmender DISAP Partner in deiner Umgebung.</p></div>
        <div class="events">
          ${this.renderEvent("08","JUN","Filmabend im Kino Passage","20:15 Uhr · 1,2 km entfernt · 80 Punkte beim Ticketkauf")}
          ${this.renderEvent("09","JUN","Sonderausstellung im Museum","Ganztägig · 0,7 km entfernt · Gratis Eintritt ab 1.000 Punkten")}
          ${this.renderEvent("10","JUN","Galerie Abend West","18:00 Uhr · 2,0 km entfernt · 2x Punkte auf Getränke")}
          ${this.renderEvent("12","JUN","Open Stage im Theater Loft","19:30 Uhr · 1,8 km entfernt · Coupon für Studierende aktiv")}
        </div>
      </aside>
    </section>`;
  }

  static bind() {
    document.querySelectorAll(".chip").forEach(chip => chip.addEventListener("click", () => {
      document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
      chip.classList.add("active");
    }));
    document.querySelectorAll(".pin").forEach(pin => pin.addEventListener("click", () => {
      const x = mapData[pin.title];
      document.getElementById("tip").innerHTML = `<h3>${x[0]}</h3><p>${x[1]}</p><div class="meta"><span class="pill a">${x[2]}</span><span class="pill">${x[3]}</span><span class="pill">${x[4]}</span></div>`;
    }));
  }
}

class AnnouncementsView {
  cat(icon,title,text,active=false){return `<div class="cat ${active?"active":""}"><div class="catico">${icon}</div><div><h4>${title}</h4><p class="muted">${text}</p></div></div>`}
  option(name,value){return `<div class="option"><div class="otop"><span>${name}</span><span>${value}%</span></div><div class="bar"><span style="width:${value}%"></span></div></div>`}
  render() {
    return `<section class="grid3">
      <aside class="panel hide-mobile">
        <div class="ph"><h2>Stadtkanal</h2><p>Kommunale Inhalte für Bürgerinnen, Bürger und lokale DISAP Nutzer.</p></div>
        <div class="city">
          <div class="citylogo"><div class="seal">🏛</div><div><h3>Stadt Leipzig</h3><p>Offizieller DISAP Partner</p></div></div>
          ${this.cat("📢","Alle Beiträge","Infos, Events, Umfragen",true)}
          ${this.cat("ℹ️","Informationen","Neuigkeiten der Kommune")}
          ${this.cat("📊","Umfragen","Meinung teilen")}
          ${this.cat("🎪","Events","Veranstaltungen im Raum")}
        </div>
      </aside>
      <main class="panel">
        <div class="toolbar"><input id="annSearch" placeholder="Ankündigung, Thema oder Event suchen"><button class="chip active" data-filter="all">Alle</button><button class="chip" data-filter="info">Infos</button><button class="chip" data-filter="survey">Umfragen</button><button class="chip" data-filter="event">Events</button></div>
        <div class="feed">
          <article class="post" data-type="info" data-search="innenstadt mobilität baustelle information">
            <div class="posttop"><div class="author"><div class="avatar">🏛</div><div><h3>Stadt Leipzig</h3><p>Heute · Offizielle Information</p></div></div><span class="tag info">Information</span></div>
            <h2>Neue Mobilitätszone in der Innenstadt</h2><p>Ab nächster Woche wird in Teilen der Innenstadt eine neue Verkehrsführung getestet. Fußwege, Radwege und Lieferzonen sollen dadurch übersichtlicher werden.</p>
            <div class="meta"><span class="pill">Innenstadt</span><span class="pill">Mobilität</span><span class="pill">Gültig ab Montag</span></div><div><button class="primary">Details ansehen</button> <button class="secondary">Merken</button></div>
          </article>
          <article class="post" data-type="survey" data-search="umfrage innenstadt kultur angebot befragung">
            <div class="posttop"><div class="author"><div class="avatar">🏛</div><div><h3>Stadt Leipzig</h3><p>Gestern · Bürgerumfrage</p></div></div><span class="tag survey">Umfrage</span></div>
            <h2>Welche Kulturangebote wünscht du dir häufiger?</h2><p>Die Stadt Leipzig möchte lokale Kulturangebote besser auf die Interessen der Bürgerinnen und Bürger abstimmen.</p>
            <div class="survey">${this.option("Open Air Kino",42)}${this.option("Konzerte im Park",35)}${this.option("Stadtteilfeste",23)}</div><div><button class="primary">Abstimmen</button> <button class="secondary">Teilen</button></div>
          </article>
          <article class="post" data-type="event" data-search="event stadtfest leipzig wochenende markt musik">

  static bind() {
    const chips = document.querySelectorAll(".toolbar .chip");
    const input = document.getElementById("annSearch");
    const filter = () => {
      const active = document.querySelector(".toolbar .chip.active")?.dataset.filter || "all";
      const s = (input.value || "").toLowerCase().trim();
      document.querySelectorAll(".post").forEach(p => {
        const typeOk = active === "all" || p.dataset.type === active;
        const textOk = (p.dataset.search + " " + p.innerText).toLowerCase().includes(s);
        p.style.display = typeOk && textOk ? "grid" : "none";
      });
    };
    chips.forEach(c=>c.addEventListener("click",()=>{chips.forEach(x=>x.classList.remove("active"));c.classList.add("active");filter()}));
    input?.addEventListener("input", filter);
  }
}
